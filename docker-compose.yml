services:
  postgres:
    image: postgres:17-alpine
    container_name: taskko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskko
      POSTGRES_PASSWORD: taskko
      POSTGRES_DB: taskko
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskko -d taskko"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
